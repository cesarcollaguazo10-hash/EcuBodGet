<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack - Sistema Financiero Personal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface-raised: #1a2233;
      --surface-muted: #1e293b;
      --border: #2d3a4f;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --text-quaternary: #475569;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --positive: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --chart-1: #3b82f6;
      --chart-2: #ef4444;
      --chart-3: #22c55e;
      --chart-4: #a855f7;
      --chart-5: #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .phone-frame {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: 40px;
      border: 8px solid #1a1a2e;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 40px rgba(59,130,246,0.08);
      overflow: hidden;
      position: relative;
    }

    .notch {
      width: 120px;
      height: 28px;
      background: #000;
      border-radius: 0 0 20px 20px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .screen {
      padding: 44px 16px 20px 16px;
      overflow-y: auto;
      max-height: 800px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .balance {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .balance-change {
      font-size: 13px;
      color: var(--positive);
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .chart-container { position: relative; height: 160px; }

    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    .donut-wrapper { display: flex; align-items: center; gap: 20px; }

    .donut-center { text-align: center; }

    .donut-amount { font-size: 22px; font-weight: 700; }

    .donut-label { font-size: 11px; color: var(--text-tertiary); }

    .category-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .category-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }

    .category-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    .category-name { flex: 1; color: var(--text-secondary); }

    .category-value { font-weight: 600; }

    .goal-item { margin-bottom: 12px; }
    .goal-item:last-child { margin-bottom: 0; }

    .goal-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 5px;
    }

    .goal-name { color: var(--text-secondary); }

    .goal-percent { font-weight: 600; }

    .progress-track {
      height: 6px;
      background: var(--surface-muted);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s ease;
    }

    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .alert-item:last-child { margin-bottom: 0; }

    .alert-warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .alert-icon { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; }

    .alert-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }

    .alert-desc { font-size: 12px; color: var(--text-tertiary); line-height: 1.4; }

    .reminder-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .reminder-item:last-child { margin-bottom: 0; }

    .reminder-date { text-align: center; min-width: 40px; }

    .reminder-day { font-size: 20px; font-weight: 700; line-height: 1; }

    .reminder-month {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .reminder-info { flex: 1; }

    .reminder-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }

    .reminder-detail { font-size: 12px; color: var(--text-tertiary); }

    .reminder-badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-danger { background: var(--danger); color: #fff; }
    .badge-muted { background: var(--surface-muted); color: var(--text-tertiary); }

    .actions-row { display: flex; gap: 10px; margin-bottom: 14px; }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
    }

    .btn-secondary {
      background: var(--surface-raised);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--surface-muted); }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 14px 0 8px 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .nav-item {
      text-align: center;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .nav-item:hover { background: var(--surface-raised); }

    .nav-item.active .nav-icon { stroke: var(--accent); }
    .nav-item.active .nav-label { color: var(--accent); }

    .nav-icon {
      width: 22px;
      height: 22px;
      stroke: var(--text-tertiary);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-label { font-size: 10px; margin-top: 3px; color: var(--text-tertiary); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-select:focus { border-color: var(--accent); }

    .form-input::placeholder { color: var(--text-quaternary); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .btn-save:hover { background: var(--accent-light); }

    /* Transaction List */
    .transaction-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .transaction-item:last-child { border-bottom: none; }

    .tx-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .tx-info { flex: 1; }

    .tx-title { font-size: 14px; font-weight: 500; }

    .tx-date { font-size: 12px; color: var(--text-tertiary); }

    .tx-amount { font-size: 15px; font-weight: 600; }

    .tx-income { color: var(--positive); }
    .tx-expense { color: var(--danger); }

    .delete-btn {
      opacity: 0;
      transition: opacity 0.2s;
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }

    .transaction-item:hover .delete-btn { opacity: 1; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }

    .tab {
      flex: 1;
      padding: 10px;
      background: var(--surface-muted);
      border: none;
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-tertiary);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

    .empty-state-text { font-size: 14px; }

    .screen::-webkit-scrollbar { width: 4px; }
    .screen::-webkit-scrollbar-track { background: transparent; }
    .screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeInUp 0.5s ease forwards; }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }

    @media (max-width: 480px) {
      body { padding: 0; }
      .phone-frame {
        border-radius: 0;
        border: none;
        max-width: 100%;
        height: 100vh;
      }
      .screen { max-height: none; height: 100vh; }
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="notch"></div>
    <div class="screen" id="mainScreen">
      <!-- Header / Balance -->
      <div class="header">
        <div class="header-label">Balance total</div>
        <div class="balance" id="balanceDisplay">$2,847.50</div>
        <div class="balance-change">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
          <span id="monthChange">+ $340.00 este mes</span>
        </div>
      </div>

      <!-- Income vs Expenses -->
      <div class="card">
        <div class="card-title">
          Ingresos vs Gastos
          <span class="card-subtitle" id="chartMonth">Julio 2026</span>
        </div>
        <div class="chart-container">
          <svg width="100%" height="150" viewBox="0 0 380 150" id="barChart"></svg>
        </div>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--positive);"></div>
            <span>Ingreso</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--danger);"></div>
            <span>Gasto</span>
          </div>
        </div>
      </div>

      <!-- Spending by Category -->
      <div class="card">
        <div class="card-title">Gastos por categoría</div>
        <div class="donut-wrapper">
          <svg width="130" height="130" viewBox="0 0 130 130" id="donutChart"></svg>
          <div class="category-list" id="categoryList"></div>
        </div>
      </div>

      <!-- Savings Goals -->
      <div class="card">
        <div class="card-title">Metas de ahorro</div>
        <div id="goalsList"></div>
      </div>

      <!-- Alerts & Insights -->
      <div class="card">
        <div class="card-title">Alertas e insights</div>
        <div id="alertsList"></div>
      </div>

      <!-- Reminders -->
      <div class="card">
        <div class="card-title">
          Recordatorios financieros
          <span class="card-subtitle" id="reminderMonth">Julio 2026</span>
        </div>
        <div id="remindersList"></div>
      </div>

      <!-- Quick Actions -->
      <div class="actions-row">
        <button class="btn btn-primary" onclick="openModal('expense')">+ Nuevo gasto</button>
        <button class="btn btn-secondary" onclick="openModal('income')">+ Nuevo ingreso</button>
      </div>

      <!-- Recent Transactions -->
      <div class="card">
        <div class="card-title">Transacciones recientes</div>
        <div id="transactionsList"></div>
      </div>

      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('analysis')">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <div class="nav-label">Análisis</div>
        </div>
        <div class="nav-item" onclick="switchTab('growth')">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
            <polyline points="17 6 23 6 23 12"/>
          </svg>
          <div class="nav-label">Crecimiento</div>
        </div>
        <div class="nav-item" onclick="switchTab('security')">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <div class="nav-label">Seguridad</div>
        </div>
        <div class="nav-item" onclick="switchTab('settings')">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <div class="nav-label">Ajustes</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Nuevo gasto</div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <input type="text" class="form-input" id="txDesc" placeholder="Ej: Supermercado, Alquiler...">
      </div>
      <div class="form-group">
        <label class="form-label">Monto ($)</label>
        <input type="number" class="form-input" id="txAmount" placeholder="0.00" step="0.01">
      </div>
      <div class="form-group" id="categoryGroup">
        <label class="form-label">Categoría</label>
        <select class="form-select" id="txCategory">
          <option value="Alquiler">Alquiler</option>
          <option value="Comida">Comida</option>
          <option value="Transporte">Transporte</option>
          <option value="Servicios">Servicios</option>
          <option value="Entretenimiento">Entretenimiento</option>
          <option value="Salud">Salud</option>
          <option value="Educación">Educación</option>
          <option value="Otros">Otros</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-input" id="txDate">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveTransaction()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ===== DATA =====
    let transactions = JSON.parse(localStorage.getItem('fintrack_transactions')) || [
      { id: 1, type: 'income', desc: 'Salario', amount: 1800, date: '2026-07-01', category: 'Salario' },
      { id: 2, type: 'expense', desc: 'Alquiler', amount: 350, date: '2026-07-01', category: 'Alquiler' },
      { id: 3, type: 'expense', desc: 'Supermercado', amount: 120, date: '2026-07-05', category: 'Comida' },
      { id: 4, type: 'expense', desc: 'Gasolina', amount: 60, date: '2026-07-08', category: 'Transporte' },
      { id: 5, type: 'income', desc: 'Freelance', amount: 400, date: '2026-07-10', category: 'Freelance' },
      { id: 6, type: 'expense', desc: 'Netflix + Spotify', amount: 25, date: '2026-07-12', category: 'Entretenimiento' },
      { id: 7, type: 'expense', desc: 'Luz y agua', amount: 90, date: '2026-07-12', category: 'Servicios' },
      { id: 8, type: 'expense', desc: 'Uber', amount: 15, date: '2026-07-12', category: 'Transporte' },
      { id: 9, type: 'expense', desc: 'Restaurante', amount: 45, date: '2026-07-12', category: 'Comida' },
      { id: 10, type: 'expense', desc: 'Cine', amount: 15, date: '2026-07-12', category: 'Entretenimiento' },
    ];

    let goals = JSON.parse(localStorage.getItem('fintrack_goals')) || [
      { id: 1, name: 'Fondo de emergencia', target: 3000, current: 3000, color: 'var(--positive)' },
      { id: 2, name: 'Nueva laptop', target: 1200, current: 840, color: 'var(--chart-1)' },
      { id: 3, name: 'Viaje a Cusco', target: 1500, current: 450, color: 'var(--chart-4)' },
      { id: 4, name: 'Inversión ETF', target: 2000, current: 400, color: 'var(--chart-3)' },
    ];

    let reminders = JSON.parse(localStorage.getItem('fintrack_reminders')) || [
      { id: 1, title: 'Pago tarjeta de crédito', amount: 180, date: '2026-07-15', time: '18:00' },
      { id: 2, title: 'Transferencia a fondo de inversión', amount: 200, date: '2026-07-20', time: '09:00' },
      { id: 3, title: 'Pago de alquiler', amount: 350, date: '2026-08-01', time: '08:00' },
    ];

    let currentModalType = '';
    let nextId = Math.max(...transactions.map(t => t.id), 0) + 1;

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('txDate').valueAsDate = new Date();
      renderAll();
      checkReminders();
      setInterval(checkReminders, 60000); // Check every minute
    });

    // ===== RENDER ALL =====
    function renderAll() {
      renderBalance();
      renderBarChart();
      renderDonutChart();
      renderGoals();
      renderAlerts();
      renderReminders();
      renderTransactions();
    }

    // ===== BALANCE =====
    function renderBalance() {
      const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const balance = income - expense;
      const change = income - expense;
      document.getElementById('balanceDisplay').textContent = '$' + balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      document.getElementById('monthChange').textContent = (change >= 0 ? '+ ' : '- ') + '$' + Math.abs(change).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' este mes';
    }

    // ===== BAR CHART =====
    function renderBarChart() {
      const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const currentMonth = new Date().getMonth();
      const data = [];
      for (let i = 3; i >= 0; i--) {
        const m = (currentMonth - i + 12) % 12;
        const monthIncome = transactions.filter(t => {
          const d = new Date(t.date);
          return t.type === 'income' && d.getMonth() === m;
        }).reduce((s, t) => s + t.amount, 0);
        const monthExpense = transactions.filter(t => {
          const d = new Date(t.date);
          return t.type === 'expense' && d.getMonth() === m;
        }).reduce((s, t) => s + t.amount, 0);
        data.push({ month: months[m], income: monthIncome, expense: monthExpense });
      }

      const maxVal = Math.max(...data.map(d => Math.max(d.income, d.expense)), 1);
      const svgH = 150;
      const chartH = 100;
      const barW = 26;
      const gap = 12;
      const startX = 50;
      const baseY = 110;

      let svg = '';
      // Grid
      svg += `<line x1="40" y1="15" x2="370" y2="15" stroke="var(--border)" stroke-width="0.5"/>`;
      svg += `<line x1="40" y1="55" x2="370" y2="55" stroke="var(--border)" stroke-width="0.5"/>`;
      svg += `<line x1="40" y1="95" x2="370" y2="95" stroke="var(--border)" stroke-width="0.5"/>`;
      svg += `<text x="35" y="19" text-anchor="end" font-size="10" fill="var(--text-quaternary)" font-family="Inter">${Math.round(maxVal)}</text>`;
      svg += `<text x="35" y="59" text-anchor="end" font-size="10" fill="var(--text-quaternary)" font-family="Inter">${Math.round(maxVal/2)}</text>`;
      svg += `<text x="35" y="99" text-anchor="end" font-size="10" fill="var(--text-quaternary)" font-family="Inter">0</text>`;

      data.forEach((d, i) => {
        const x = startX + i * (barW * 2 + gap + 20);
        const incH = (d.income / maxVal) * chartH;
        const expH = (d.expense / maxVal) * chartH;
        svg += `<rect x="${x}" y="${baseY - incH}" width="${barW}" height="${incH}" rx="4" fill="var(--positive)" opacity="0.9"/>`;
        svg += `<rect x="${x + barW + 4}" y="${baseY - expH}" width="${barW}" height="${expH}" rx="4" fill="var(--danger)" opacity="0.9"/>`;
        svg += `<text x="${x + barW}" y="${baseY + 18}" text-anchor="middle" font-size="10" fill="var(--text-tertiary)" font-family="Inter">${d.month}</text>`;
      });

      document.getElementById('barChart').innerHTML = svg;
    }

    // ===== DONUT CHART =====
    function renderDonutChart() {
      const cats = {};
      transactions.filter(t => t.type === 'expense').forEach(t => {
        cats[t.category] = (cats[t.category] || 0) + t.amount;
      });

      const catColors = {
        'Alquiler': 'var(--chart-1)',
        'Comida': 'var(--chart-2)',
        'Transporte': 'var(--chart-3)',
        'Servicios': 'var(--chart-4)',
        'Entretenimiento': 'var(--chart-5)',
        'Salud': '#f97316',
        'Educación': '#06b6d4',
        'Otros': '#8b5cf6'
      };

      const total = Object.values(cats).reduce((s, v) => s + v, 0);
      const circumference = 2 * Math.PI * 45;
      let offset = 0;
      let svg = '';
      const entries = Object.entries(cats).sort((a, b) => b[1] - a[1]);

      entries.forEach(([cat, amount]) => {
        const dash = (amount / total) * circumference;
        svg += `<circle cx="65" cy="65" r="45" fill="none" stroke="${catColors[cat] || 'var(--text-quaternary)'}" stroke-width="12" stroke-dasharray="${dash} ${circumference - dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 65 65)"/>`;
        offset += dash;
      });

      svg += `<text x="65" y="61" text-anchor="middle" font-size="18" font-weight="700" fill="var(--text-primary)" font-family="Inter">$${Math.round(total)}</text>`;
      svg += `<text x="65" y="77" text-anchor="middle" font-size="10" fill="var(--text-tertiary)" font-family="Inter">este mes</text>`;

      document.getElementById('donutChart').innerHTML = svg;

      // Category list
      let listHtml = '';
      entries.forEach(([cat, amount]) => {
        listHtml += `
          <div class="category-item">
            <div class="category-dot" style="background: ${catColors[cat] || 'var(--text-quaternary)'};"></div>
            <span class="category-name">${cat}</span>
            <span class="category-value">$${amount}</span>
          </div>`;
      });
      document.getElementById('categoryList').innerHTML = listHtml;
    }

    // ===== GOALS =====
    function renderGoals() {
      let html = '';
      goals.forEach(g => {
        const pct = Math.round((g.current / g.target) * 100);
        html += `
          <div class="goal-item">
            <div class="goal-header">
              <span class="goal-name">${g.name}</span>
              <span class="goal-percent" style="color: ${g.color};">${pct}%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width: ${Math.min(pct, 100)}%; background: ${g.color};"></div>
            </div>
          </div>`;
      });
      document.getElementById('goalsList').innerHTML = html;
    }

    // ===== ALERTS =====
    function renderAlerts() {
      const foodTotal = transactions.filter(t => t.type === 'expense' && t.category === 'Comida').reduce((s, t) => s + t.amount, 0);
      const entTotal = transactions.filter(t => t.type === 'expense' && t.category === 'Entretenimiento').reduce((s, t) => s + t.amount, 0);
      const travelGoal = goals.find(g => g.name.includes('Viaje'));

      let html = '';

      if (foodTotal > 200) {
        html += `
          <div class="alert-item alert-warning">
            <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <div>
              <div class="alert-title" style="color: var(--warning);">Gasto alto en comida</div>
              <div class="alert-desc">Llevas $${foodTotal} este mes. Sugerencia: cocinar 2 días más por semana ahorraría ~$60.</div>
            </div>
          </div>`;
      }

      if (travelGoal && entTotal > 30) {
        html += `
          <div class="alert-item alert-success">
            <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="var(--positive)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <div>
              <div class="alert-title" style="color: var(--positive);">Meta de ahorro alcanzable</div>
              <div class="alert-desc">Si reduces entretenimiento en $20/mes, completarías tu fondo de viaje 2 meses antes.</div>
            </div>
          </div>`;
      }

      if (html === '') {
        html = `
          <div class="empty-state">
            <div class="empty-state-icon">✅</div>
            <div class="empty-state-text">Tus finanzas van bien. Sin alertas por ahora.</div>
          </div>`;
      }

      document.getElementById('alertsList').innerHTML = html;
    }

    // ===== REMINDERS =====
    function renderReminders() {
      const today = new Date();
      today.setHours(0,0,0,0);

      let html = '';
      reminders.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(r => {
        const rDate = new Date(r.date);
        rDate.setHours(0,0,0,0);
        const diffDays = Math.ceil((rDate - today) / (1000 * 60 * 60 * 24));
        let badge = '';
        if (diffDays === 0) badge = '<div class="reminder-badge badge-danger">Hoy</div>';
        else if (diffDays < 0) badge = '<div class="reminder-badge badge-danger">Vencido</div>';
        else badge = `<div class="reminder-badge badge-muted">${diffDays} día${diffDays > 1 ? 's' : ''}</div>`;

        const dateObj = new Date(r.date);
        html += `
          <div class="reminder-item">
            <div class="reminder-date">
              <div class="reminder-day">${dateObj.getDate()}</div>
              <div class="reminder-month">${dateObj.toLocaleString('es', {month:'short'})}</div>
            </div>
            <div class="reminder-info">
              <div class="reminder-title">${r.title}</div>
              <div class="reminder-detail">$${r.amount.toFixed(2)} · ${r.time}</div>
            </div>
            ${badge}
          </div>`;
      });
      document.getElementById('remindersList').innerHTML = html;
    }

    // ===== TRANSACTIONS =====
    function renderTransactions() {
      const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
      let html = '';
      const icons = {
        'Alquiler': '🏠', 'Comida': '🍽️', 'Transporte': '🚗', 'Servicios': '⚡',
        'Entretenimiento': '🎬', 'Salud': '💊', 'Educación': '📚', 'Otros': '📦',
        'Salario': '💰', 'Freelance': '💻'
      };

      sorted.slice(0, 8).forEach(t => {
        const icon = icons[t.category] || icons[t.desc] || (t.type === 'income' ? '💰' : '📦');
        const amountClass = t.type === 'income' ? 'tx-income' : 'tx-expense';
        const sign = t.type === 'income' ? '+' : '-';
        html += `
          <div class="transaction-item">
            <div class="tx-icon" style="background: ${t.type === 'income' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)'};">${icon}</div>
            <div class="tx-info">
              <div class="tx-title">${t.desc}</div>
              <div class="tx-date">${t.category} · ${new Date(t.date).toLocaleDateString('es')}</div>
            </div>
            <div class="tx-amount ${amountClass}">${sign}$${t.amount.toFixed(2)}</div>
            <button class="delete-btn" onclick="deleteTransaction(${t.id})">🗑️</button>
          </div>`;
      });
      document.getElementById('transactionsList').innerHTML = html;
    }

    // ===== MODAL =====
    function openModal(type) {
      currentModalType = type;
      document.getElementById('modalTitle').textContent = type === 'expense' ? 'Nuevo gasto' : 'Nuevo ingreso';
      document.getElementById('categoryGroup').style.display = type === 'expense' ? 'block' : 'none';
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('txDesc').value = '';
      document.getElementById('txAmount').value = '';
      document.getElementById('txDesc').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function saveTransaction() {
      const desc = document.getElementById('txDesc').value.trim();
      const amount = parseFloat(document.getElementById('txAmount').value);
      const category = document.getElementById('txCategory').value;
      const date = document.getElementById('txDate').value;

      if (!desc || isNaN(amount) || amount <= 0 || !date) {
        showToast('Completa todos los campos');
        return;
      }

      transactions.push({
        id: nextId++,
        type: currentModalType,
        desc,
        amount,
        date,
        category: currentModalType === 'expense' ? category : 'Ingreso'
      });

      localStorage.setItem('fintrack_transactions', JSON.stringify(transactions));
      closeModal();
      renderAll();
      showToast(currentModalType === 'expense' ? 'Gasto guardado ✅' : 'Ingreso guardado ✅');
    }

    function deleteTransaction(id) {
      if (!confirm('¿Eliminar esta transacción?')) return;
      transactions = transactions.filter(t => t.id !== id);
      localStorage.setItem('fintrack_transactions', JSON.stringify(transactions));
      renderAll();
      showToast('Transacción eliminada');
    }

    // ===== TOAST =====
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ===== REMINDER ALERTS =====
    function checkReminders() {
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      const currentTime = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

      reminders.forEach(r => {
        if (r.date === today && r.time === currentTime) {
          showToast(`⏰ Recordatorio: ${r.title} - $${r.amount}`);
        }
      });
    }

    // ===== NAV TABS =====
    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.currentTarget.classList.add('active');

      if (tab === 'analysis') {
        showToast('Análisis cargado');
      } else if (tab === 'growth') {
        showToast('Proyección de crecimiento (próximamente)');
      } else if (tab === 'security') {
        showToast('Configuración de seguridad (próximamente)');
      } else if (tab === 'settings') {
        showToast('Ajustes (próximamente)');
      }
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    // Enter key in modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
